server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# -------------------------------------------------------
# JWT Configuration
# -------------------------------------------------------
# secret: must be a long random string (min 256-bit for HS256)
# expiration: token validity in milliseconds
#   - 900000    =  15 minutes
#   - 3600000   =  1 hour
#   - 86400000  =  24 hours
# -------------------------------------------------------
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

logging:
  level:
    com.vbforge.jwtsecurity: DEBUG
    org.springframework.security: DEBUG
