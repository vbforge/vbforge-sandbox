server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/jwt_spring_security_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:11111111}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# -------------------------------------------------------
# JWT Configuration
# -------------------------------------------------------
# secret: must be a long random string (min 256-bit for HS256)
# expiration: token validity in milliseconds
#   - 900000    =  15 minutes
#   - 3600000   =  1 hour
#   - 86400000  =  24 hours
# -------------------------------------------------------
jwt:
  secret: "5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437"
  expiration: 86400000   # 24 hours in ms

logging:
  level:
    com.vbforge.jwtbasics: DEBUG
    org.springframework.security: DEBUG
