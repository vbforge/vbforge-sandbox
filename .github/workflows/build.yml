name: Build All Projects

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build all Maven projects
        run: |
          find . -name "pom.xml" \
            ! -path "*/.git/*" \
            ! -path "*/docs/*" \
            | sort \
            | while read pom; do
              dir=$(dirname "$pom")
              echo "──────────────────────────────"
              echo "▶ Building: $dir"
              echo "──────────────────────────────"
              (cd "$dir" && mvn clean compile -q --no-transfer-progress) \
                && echo "✔ $dir — OK" \
                || echo "✘ $dir — FAILED"
            done
