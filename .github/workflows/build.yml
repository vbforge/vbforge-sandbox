name: Build All Projects

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test all Maven projects
        run: |
          FAILED=0
          find . -name "pom.xml" \
            ! -path "*/.git/*" \
            ! -path "*/docs/*" \
            | sort \
            | while read pom; do
              dir=$(dirname "$pom")
              echo "──────────────────────────────"
              echo "▶ Building: $dir"
              echo "──────────────────────────────"
              if (cd "$dir" && mvn clean verify -q --no-transfer-progress); then
                echo "✔✔✔ $dir — OK"
              else
                echo "✘✘✘ $dir — FAILED"
                FAILED=1
              fi
            done
          exit $FAILED
