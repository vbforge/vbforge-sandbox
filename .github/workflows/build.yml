name: Build All Projects

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test all Maven projects
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          FAIL_FLAG=$(mktemp)
          echo "0" > "$FAIL_FLAG"

          find . -name "pom.xml" \
            ! -path "*/.git/*" \
            ! -path "*/docs/*" \
            | sort \
            | while read pom; do
              dir=$(dirname "$pom")
              echo "──────────────────────────────"
              echo "▶ Building: $dir"
              echo "──────────────────────────────"
              if (cd "$dir" && mvn clean verify -q --no-transfer-progress -Djwt.secret="${JWT_SECRET}"); then
                echo "✔ $dir — OK"
              else
                echo "✘ $dir — FAILED"
                echo "1" > "$FAIL_FLAG"
              fi
            done

          if [ "$(cat $FAIL_FLAG)" = "1" ]; then
            echo "──────────────────────────────"
            echo "✘ One or more projects failed!"
            echo "──────────────────────────────"
            exit 1
          else
            echo "──────────────────────────────"
            echo "✔ All projects passed!"
            echo "──────────────────────────────"
          fi
